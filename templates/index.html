<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>AI记账系统</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body {

            background:
                linear-gradient(
                    135deg,
                    #0d6efd,
                    #198754
                );

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            color: white;
        }

        .hero-card {

            background: rgba(255,255,255,0.1);

            backdrop-filter: blur(10px);

            border-radius: 20px;

            padding: 50px;

            text-align: center;

            width: 90%;

            max-width: 700px;
        }

        .hero-title {

            font-size: 50px;

            font-weight: bold;
        }

        .hero-subtitle {

            font-size: 20px;

            opacity: 0.9;

            margin-top: 20px;
        }

        .btn-custom {

            padding: 12px 30px;

            font-size: 18px;

            border-radius: 10px;
        }

    </style>

</head>

<body>

    <div class="hero-card shadow-lg">

        <h1 class="hero-title">
            AI智能记账系统
        </h1>

        <p class="hero-subtitle">

            基于 Flask + SQLite + Chart.js

            打造的智能消费分析平台

        </p >

        <div class="mt-5 d-flex justify-content-center gap-3">

            <a
                href="/login"
                class="btn btn-light btn-custom"
            >
                登录
            </a >

            <a
                href="/register"
                class="btn btn-warning btn-custom"
            >
                注册
            </a >

        </div>

    </div>

</body>

</html>
