{% extends "base.html" %}

{% block title %}
添加账单
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        添加账单
                    </h2>

                    <form method="POST">

                        <!-- 日期 -->
                        <div class="mb-3">

                            <label class="form-label">
                                日期
                            </label>

                            <input
                                type="date"
                                name="date"
                                class="form-control"
                                value="{{ today }}"
                                required
                            >

                        </div>

                        <!-- 消费标题 -->
                        <div class="mb-3">

                            <label class="form-label">
                                消费内容
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="title"
                                placeholder="例如：麦当劳、地铁、电影"
                                required
                            >

                        </div>

                        <!-- 金额 -->
                        <div class="mb-4">

                            <label class="form-label">
                                金额
                            </label>

                            <input
                                type="number"
                                step="0.01"
                                class="form-control"
                                name="money"
                                placeholder="请输入金额"
                                required
                            >

                        </div>

                        <button class="btn btn-primary w-100">
                            保存账单
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
