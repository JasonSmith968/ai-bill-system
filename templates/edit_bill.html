{% extends "base.html" %}

{% block title %}
编辑账单
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-sm">

        <div class="card-body">

            <h2 class="mb-4">
                编辑账单
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        日期
                    </label>

                    <input
                        type="date"
                        name="date"
                        class="form-control"
                        value="{{ bill['date'] }}"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        标题
                    </label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        value="{{ bill['title'] }}"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        金额
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="money"
                        class="form-control"
                        value="{{ bill['money'] }}"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        分类
                    </label>

                    <select
                        name="category"
                        class="form-select"
                    >

                        <option
                            value="餐饮"
                            {% if bill['category'] == '餐饮' %}
                                selected
                            {% endif %}
                        >
                            餐饮
                        </option>

                        <option
                            value="交通"
                            {% if bill['category'] == '交通' %}
                                selected
                            {% endif %}
                        >
                            交通
                        </option>

                        <option
                            value="购物"
                            {% if bill['category'] == '购物' %}
                                selected
                            {% endif %}
                        >
                            购物
                        </option>

                        <option
                            value="娱乐"
                            {% if bill['category'] == '娱乐' %}
                                selected
                            {% endif %}
                        >
                            娱乐
                        </option>

                        <option
                            value="学习"
                            {% if bill['category'] == '学习' %}
                                selected
                            {% endif %}
                        >
                            学习
                        </option>

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    保存修改
                </button>

                <a
                    href="/dashboard"
                    class="btn btn-secondary"
                >
                    返回
                </a >

            </form>

        </div>

    </div>

</div>

{% endblock %}
